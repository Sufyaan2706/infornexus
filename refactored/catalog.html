<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .header-controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .catalog-list {
            list-style: none;
            padding: 0;
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        }

        .item-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            background: #f9f9f9;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .badge {
            background: #007bff;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.85em;
        }
    </style>
</head>

<body>

    <div class="header-controls">
        <h2>Product Catalog</h2>
        <button id="loadCatalogBtn">Load Catalog Items</button>
    </div>

    <div id="catalog-container">
        <p style="color: #666;">Click the button to load the catalog...</p>
    </div>

    </head>
    <script type="module" src="/js/catalog.js"></script>
</body>


</html>
